<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Korean Grammar Explainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Korean Grammar Explainer</h1>

    <p class="subtitle">
      Analyze Korean grammar in a simple and beginner-friendly way.
    </p>

    <textarea
      id="inputSentence"
      placeholder="Enter Korean sentence..."
    ></textarea>

    <button onclick="analyzeSentence()">
      Analyze Grammar
    </button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
